name: dub CI
on:
  push:
    branches:
      - master
  pull_request:
jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        dc: [dmd-latest, ldc-latest]
        exclude:
          - os: macos-latest
            dc: dmd-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 # v2
      - name: Install D compiler
        uses: dlang-community/setup-dlang@0a7469b93f791d83f30932c6fd105796c6966e20 # v2.0.0
        with:
          compiler: ${{ matrix.dc }}
      - name: Build & Test
        run: |
          dub build --compiler=$DC
          dub test --compiler=$DC
          dub build :protoc-gen-d --compiler=$DC
      - name: Run Conformance Tests
        working-directory: conformance
        run: |
          ./run-conformance-test.sh
          echo "$(pwd)/protobuf/src" >> $GITHUB_PATH
          echo "PROTO_PATH=-I. -I$(pwd)/protobuf/src" >> $GITHUB_ENV
        if: false # Disable conformance tests for now, as they are hard to setup in CI
      - name: Run protoc-gen-d Examples
        run: |
          cd examples
          dub build :add_person --compiler=$DC
          dub build :list_people --compiler=$DC
        if: false # Disable examples for now, as they require protoc setup
